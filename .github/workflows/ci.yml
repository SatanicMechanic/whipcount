name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate script imports and syntax
        run: |
          python -c "
          import ast, sys
          with open('analyze_votes.py') as f:
              src = f.read()
          ast.parse(src)
          print('Syntax OK')
          import pandas, requests
          print(f'pandas {pandas.__version__} OK')
          print(f'requests {requests.__version__} OK')
          "
